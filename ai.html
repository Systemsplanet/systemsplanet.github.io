<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Local WebGPU LLM Chat</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #181825;
            --user-msg: #89b4fa;
            --bot-msg: #313244;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --border: #45475a;
            --danger: #f38ba8;
            --success: #a6e3a1;
            --modal-bg: rgba(0, 0, 0, 0.7);
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100%; 
            height: 100dvh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        #status {
            font-size: 0.8rem;
            color: var(--danger);
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 6px;
            flex-grow: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Settings/Prompt Bar --- */
        #settings-bar {
            padding: 10px 20px;
            background-color: var(--chat-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #settings-bar label {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: bold;
            white-space: nowrap;
        }

        #system-prompt-input {
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 0.9rem;
            outline: none;
        }

        #system-prompt-input:focus {
            border-color: var(--user-msg);
        }

        #progress-container {
            width: 100%;
            height: 4px;
            background-color: var(--border);
            display: block; 
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--user-msg);
            transition: width 0.2s ease-out;
        }

        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth; 
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-msg);
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        #input-container {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background-color: var(--chat-bg);
        }

        #user-input {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        #user-input:disabled { opacity: 0.5; }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }

        #send-btn { background-color: var(--success); color: #11111b; }
        .action-btn { background-color: var(--border); color: var(--text-main); }
        .danger-btn { background-color: var(--danger); color: #11111b; }

        /* --- Modal GUI Styles --- */
        #history-modal {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--modal-bg);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--bg-color);
            width: 100%;
            max-width: 500px;
            max-height: 80%;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 { margin: 0; font-size: 1.2rem; }

        .modal-body {
            padding: 15px 20px;
            overflow-y: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--chat-bg);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            gap: 10px;
        }

        .history-text {
            flex-grow: 1;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-role {
            font-weight: bold;
            color: var(--user-msg);
            margin-right: 5px;
            text-transform: capitalize;
        }
        .history-role.assistant { color: var(--text-muted); }

        .delete-single-btn {
            background-color: var(--danger);
            color: #11111b;
            padding: 5px 10px;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-title-group">
                <h1>WebGPU Chat</h1>
                <button id="manage-btn" class="action-btn">Manage History</button>
            </div>
            <div id="status">Initializing...</div>
        </header>

        <div id="settings-bar">
            <label for="system-prompt-input">Persona:</label>
            <input type="text" id="system-prompt-input" autocomplete="off" placeholder="Tell the AI how to act...">
        </div>
        
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="chat-window"></div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Initializing engine..." disabled autocomplete="off">
            <button id="send-btn" disabled>Send</button>
        </div>

        <div id="history-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Manage Chat History</h2>
                    <button id="close-modal-btn" class="action-btn">Close</button>
                </div>
                <div class="modal-body" id="history-list">
                    </div>
                <div class="modal-footer">
                    <button id="delete-all-btn" class="danger-btn">Delete All Chats</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";

        // --- Configuration ---
        const MODEL_ID = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        const STORAGE_KEY = "webllm_chat_history";
        const PROMPT_STORAGE_KEY = "webllm_system_prompt";
        const DEFAULT_PROMPT = "As a grumpy yoda,";

        // DOM Elements
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const statusEl = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const systemPromptInput = document.getElementById('system-prompt-input');
        
        // Modal Elements
        const manageBtn = document.getElementById('manage-btn');
        const historyModal = document.getElementById('history-modal');
        const historyList = document.getElementById('history-list');
        const closeModalBtn = document.getElementById('close-modal-btn');
        const deleteAllBtn = document.getElementById('delete-all-btn');

        // State
        let engine;
        let messageHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        
        // Load System Prompt from local storage or use default
        let currentSystemPrompt = localStorage.getItem(PROMPT_STORAGE_KEY) || DEFAULT_PROMPT;
        systemPromptInput.value = currentSystemPrompt;

        // Save System Prompt whenever the user types in it
        systemPromptInput.addEventListener('input', (e) => {
            currentSystemPrompt = e.target.value;
            localStorage.setItem(PROMPT_STORAGE_KEY, currentSystemPrompt);
        });

        // Initialization
        async function initialize() {
            if (!navigator.gpu) {
                statusEl.innerText = "WebGPU not supported.";
                userInput.placeholder = "WebGPU is required for this app.";
                return;
            }

            if (navigator.storage && navigator.storage.persist) {
                navigator.storage.persist().then(isPersisted => {
                    console.log(`Storage persisted: ${isPersisted}`);
                });
            }

            renderMainHistory();

            const initProgressCallback = (report) => {
                const percentage = Math.round(report.progress * 100);
                statusEl.innerText = `${percentage}% - ${report.text}`;
                progressBar.style.width = `${percentage}%`;
            };

            try {
                engine = await CreateMLCEngine(MODEL_ID, { 
                    initProgressCallback,
                    appConfig: {
                        ...prebuiltAppConfig,
                        useIndexedDB: true 
                    }
                });
                
                progressContainer.style.display = "none";
                statusEl.innerText = "Ready";
                statusEl.style.color = "var(--success)";
                
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "Type a message...";
            } catch (error) {
                console.error("Engine Init Error:", error);
                statusEl.innerText = "Failed to load model.";
                userInput.placeholder = "Error loading model. Check console.";
            }
        }

        // --- Core UI Functions ---
        function appendMessageToUI(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-message' : 'bot-message');
            msgDiv.innerText = content;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        function renderMainHistory() {
            chatWindow.innerHTML = '';
            messageHistory.forEach(msg => appendMessageToUI(msg.role, msg.content));
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // --- Modal GUI Functions ---
        function openModal() {
            renderModalList();
            historyModal.style.display = 'flex';
        }

        function closeModal() {
            historyModal.style.display = 'none';
        }

        function renderModalList() {
            historyList.innerHTML = '';
            
            if (messageHistory.length === 0) {
                historyList.innerHTML = '<div style="text-align:center; color: var(--text-muted); margin-top: 20px;">No chat history found.</div>';
                return;
            }

            messageHistory.forEach((msg, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'history-item';
                
                const previewText = msg.content.length > 50 ? msg.content.substring(0, 50) + '...' : msg.content;
                
                itemDiv.innerHTML = `
                    <div class="history-text">
                        <span class="history-role ${msg.role}">${msg.role}:</span> 
                        ${previewText}
                    </div>
                    <button class="delete-single-btn" data-index="${index}">Delete</button>
                `;
                historyList.appendChild(itemDiv);
            });

            document.querySelectorAll('.delete-single-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const indexToRemove = parseInt(e.target.getAttribute('data-index'));
                    deleteSingleMessage(indexToRemove);
                });
            });
        }

        function deleteSingleMessage(index) {
            messageHistory.splice(index, 1);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));
            renderMainHistory();
            renderModalList();
        }

        // --- Chat Interaction Logic ---
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            appendMessageToUI('user', text);
            messageHistory.push({ role: 'user', content: text });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            const botMsgDiv = appendMessageToUI('assistant', '...');

            try {
                // Prepend the editable System Prompt to the conversation array
                const apiMessages = [
                    { role: 'system', content: currentSystemPrompt },
                    ...messageHistory
                ];

                const chunks = await engine.chat.completions.create({
                    messages: apiMessages,
                    temperature: 0.7,
                    stream: true
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullResponse += delta;
                    botMsgDiv.innerText = fullResponse; 
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                messageHistory.push({ role: 'assistant', content: fullResponse });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            } catch (error) {
                console.error(error);
                botMsgDiv.innerText = "An error occurred while generating the response.";
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        manageBtn.addEventListener('click', openModal);
        closeModalBtn.addEventListener('click', closeModal);

        deleteAllBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to delete ALL chat history? This cannot be undone.")) {
                messageHistory = [];
                localStorage.removeItem(STORAGE_KEY);
                renderMainHistory();
                closeModal();
            }
        });

        historyModal.addEventListener('click', (e) => {
            if (e.target === historyModal) closeModal();
        });

        // Start
        initialize();
    </script>
</body>
</html>
