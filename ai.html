<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local WebGPU LLM Chat</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #181825;
            --user-msg: #89b4fa;
            --bot-msg: #313244;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --border: #45475a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        #status {
            font-size: 0.85rem;
            color: #f38ba8;
            background: rgba(243, 139, 168, 0.1);
            padding: 5px 10px;
            border-radius: 12px;
            max-width: 50%;
            text-align: right;
        }

        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-msg);
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        #input-container {
            padding: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:disabled { opacity: 0.5; }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }

        #send-btn { background-color: #a6e3a1; color: #11111b; }
        #clear-btn { background-color: #f38ba8; color: #11111b; font-size: 0.85rem; padding: 8px 12px;}

    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div>
                <h1>Local WebGPU LLM</h1>
                <button id="clear-btn">Delete History</button>
            </div>
            <div id="status">Checking WebGPU support...</div>
        </header>

        <div id="chat-window"></div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Type a message..." disabled autocomplete="off">
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script type="module">
        // Import WebLLM from esm.run (CDN)
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        // --- Configuration ---
        // Using Phi-3 as it is excellent for browser constraints while retaining high quality.
        // You could also use "Llama-3-8B-Instruct-q4f32_1-MLC" for a larger model.
        const MODEL_ID = "Phi-3-mini-4k-instruct-q4f16_1-MLC"; 
        const STORAGE_KEY = "webllm_chat_history";

        // --- DOM Elements ---
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusEl = document.getElementById('status');

        // --- State ---
        let engine;
        // Load history from localStorage (format required by LLM API: [{role: 'user', content: '...'}, ...])
        let messageHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // --- Initialization ---
        async function initialize() {
            if (!navigator.gpu) {
                statusEl.style.color = "#f38ba8";
                statusEl.innerText = "Error: WebGPU is not supported by your browser.";
                return;
            }

            renderHistory();

            // Callback to update UI during the (potentially large) initial model download
            const initProgressCallback = (progress) => {
                statusEl.innerText = progress.text;
                statusEl.style.color = "#89b4fa";
            };

            try {
                // Initialize the model. First run will download weights (~1.8GB for Phi-3).
                // Subsequent runs will load instantly from the browser's Cache Storage.
                engine = await CreateMLCEngine(MODEL_ID, { initProgressCallback });
                
                statusEl.innerText = "Ready. Model loaded locally.";
                statusEl.style.color = "#a6e3a1";
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Failed to load model. See console.";
                statusEl.style.color = "#f38ba8";
            }
        }

        // --- UI Functions ---
        function appendMessageToUI(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-message' : 'bot-message');
            msgDiv.innerText = content;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        function renderHistory() {
            chatWindow.innerHTML = '';
            messageHistory.forEach(msg => appendMessageToUI(msg.role, msg.content));
        }

        // --- Chat Logic ---
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            // 1. Update UI and State with User Message
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            appendMessageToUI('user', text);
            messageHistory.push({ role: 'user', content: text });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            // 2. Prepare UI for Bot Response
            const botMsgDiv = appendMessageToUI('assistant', '...');

            try {
                // 3. Generate Response (Streaming)
                // We pass the entire messageHistory so the LLM remembers previous context
                const chunks = await engine.chat.completions.create({
                    messages: messageHistory,
                    temperature: 0.7,
                    stream: true
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullResponse += delta;
                    botMsgDiv.innerText = fullResponse; // Update DOM streamingly
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                // 4. Save Final Bot Response to State and Storage
                messageHistory.push({ role: 'assistant', content: fullResponse });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            } catch (error) {
                console.error(error);
                botMsgDiv.innerText = "An error occurred while generating the response.";
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to delete your local conversation history?")) {
                messageHistory = [];
                localStorage.removeItem(STORAGE_KEY);
                renderHistory();
            }
        });

        // Start the app
        initialize();
    </script>
</body>
</html>
