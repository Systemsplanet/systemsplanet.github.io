<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Local WebGPU LLM Chat</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --chat-bg: #181825;
            --user-msg: #89b4fa;
            --bot-msg: #313244;
            --text-main: #cdd6f4;
            --text-muted: #a6adc8;
            --border: #45475a;
        }

        /* Fixed mobile height and scrolling */
        html, body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            height: 100%; 
            height: 100dvh; /* Dynamic Viewport Height fixes mobile address bar cutoff */
            overflow: hidden; /* Stops body scroll, allowing only chat window to scroll */
            display: flex;
            justify-content: center;
        }

        #app-container {
            width: 100%;
            max-width: 800px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--chat-bg);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        h1 { margin: 0; font-size: 1.2rem; }

        #status {
            font-size: 0.8rem;
            color: #f38ba8;
            background: rgba(0, 0, 0, 0.2);
            padding: 5px 10px;
            border-radius: 6px;
            flex-grow: 1;
            text-align: right;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Progress Bar Styles */
        #progress-container {
            width: 100%;
            height: 4px;
            background-color: var(--border);
            display: block; /* Hidden when complete */
        }

        #progress-bar {
            height: 100%;
            width: 0%;
            background-color: #89b4fa;
            transition: width 0.2s ease-out;
        }

        #chat-window {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Smooth scrolling for chat */
            scroll-behavior: smooth; 
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            background-color: var(--user-msg);
            color: #11111b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            background-color: var(--bot-msg);
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        #input-container {
            padding: 15px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            background-color: var(--chat-bg);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:disabled { opacity: 0.5; }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.8; }
        button:disabled { cursor: not-allowed; opacity: 0.5; }

        #send-btn { background-color: #a6e3a1; color: #11111b; }
        #clear-btn { background-color: #f38ba8; color: #11111b; font-size: 0.8rem; padding: 6px 10px;}

    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <div class="header-title-group">
                <h1>WebGPU LLM</h1>
                <button id="clear-btn">Delete History</button>
            </div>
            <div id="status">Checking WebGPU support...</div>
        </header>
        
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>

        <div id="chat-window"></div>

        <div id="input-container">
            <input type="text" id="user-input" placeholder="Loading massive AI model..." disabled autocomplete="off">
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script type="module">
        // Import WebLLM from esm.run (CDN)
        import { CreateMLCEngine } from "https://esm.run/@mlc-ai/web-llm";

        //const MODEL_ID = "Phi-3-mini-4k-instruct-q4f16_1-MLC";
        //const MODEL_ID = "Qwen2.5-0.5B-Instruct-q4f16_1-MLC";
        const MODEL_ID = "Llama-3.2-1B-Instruct-q4f16_1-MLC";
        const STORAGE_KEY = "webllm_chat_history";

        // DOM Elements
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusEl = document.getElementById('status');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');

        // State
        let engine;
        let messageHistory = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // Initialization
        async function initialize() {
            // 1. Request Permission to store large files
            if (navigator.storage && navigator.storage.persist) {
               const isPersisted = await navigator.storage.persist();
               console.log(`Storage persisted: ${isPersisted}`);
            }
            if (!navigator.gpu) {
                statusEl.style.color = "#f38ba8";
                statusEl.innerText = "Error: WebGPU not supported.";
                userInput.placeholder = "WebGPU is required for this app.";
                return;
            }

            renderHistory();

            // Progress callback provided by WebLLM
            const initProgressCallback = (report) => {
                // report.progress is a float from 0.0 to 1.0
                const percentage = Math.round(report.progress * 100);
                
                // Update text and visual bar
                statusEl.innerText = `${percentage}% - ${report.text}`;
                statusEl.style.color = "#89b4fa";
                progressBar.style.width = `${percentage}%`;
            };

            try {
                // Creates engine. Downloads if not cached, loads from Cache Storage if it is.
                //engine = await CreateMLCEngine(MODEL_ID, { initProgressCallback });
                engine = await CreateMLCEngine(MODEL_ID, { 
                  initProgressCallback,
                  chatConfig: {
                  // Lowering this saves a massive amount of VRAM on mobile
                     context_window_size: 1024, 
                  },
                  // This tells WebLLM to use IndexedDB if Cache API is being blocked
                  // Some Android versions prefer IndexedDB for large blobs
                  appConfig: { 
                    useIndexedDB: true 
                  }
                });
                // Done loading
                progressContainer.style.display = "none";
                statusEl.innerText = "Ready (Model Cached)";
                statusEl.style.color = "#a6e3a1";
                
                // Enable inputs
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.placeholder = "Type a message...";
            } catch (error) {
                console.error(error);
                statusEl.innerText = "Failed to load model.";
                statusEl.style.color = "#f38ba8";
                userInput.placeholder = "Error loading model. Check console.";
            }
        }

        // UI Functions
        function appendMessageToUI(role, content) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            msgDiv.classList.add(role === 'user' ? 'user-message' : 'bot-message');
            msgDiv.innerText = content;
            chatWindow.appendChild(msgDiv);
            
            // Auto-scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return msgDiv;
        }

        function renderHistory() {
            chatWindow.innerHTML = '';
            messageHistory.forEach(msg => appendMessageToUI(msg.role, msg.content));
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Chat Logic
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || !engine) return;

            // Update UI & Local Storage with User Input
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            appendMessageToUI('user', text);
            messageHistory.push({ role: 'user', content: text });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            // Prepare bot response area
            const botMsgDiv = appendMessageToUI('assistant', '...');

            try {
                // Generate Streamed Response
                const chunks = await engine.chat.completions.create({
                    messages: messageHistory,
                    temperature: 0.7,
                    stream: true
                });

                let fullResponse = "";
                for await (const chunk of chunks) {
                    const delta = chunk.choices[0]?.delta?.content || "";
                    fullResponse += delta;
                    botMsgDiv.innerText = fullResponse; 
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

                // Finalize and save
                messageHistory.push({ role: 'assistant', content: fullResponse });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messageHistory));

            } catch (error) {
                console.error(error);
                botMsgDiv.innerText = "An error occurred while generating the response.";
            } finally {
                // Re-enable inputs
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        // Event Listeners
        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Are you sure you want to delete your local conversation history?")) {
                messageHistory = [];
                localStorage.removeItem(STORAGE_KEY);
                renderHistory();
            }
        });

        // Start
        initialize();
    </script>
</body>
</html>
